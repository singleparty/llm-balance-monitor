<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#007ACC" opacity="0.1"/>

  <!-- Wallet/Card shape -->
  <rect x="28" y="45" width="72" height="48" rx="6" fill="#007ACC" opacity="0.2"/>
  <rect x="28" y="48" width="72" height="42" rx="6" fill="#007ACC"/>

  <!-- Coin/Token symbol -->
  <circle cx="64" cy="69" r="14" fill="#FFD700" stroke="#FFA500" stroke-width="2"/>
  <text x="64" y="76" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#007ACC" text-anchor="middle">$</text>

  <!-- Clock indicator (small) -->
  <circle cx="88" cy="56" r="8" fill="#FFFFFF" stroke="#007ACC" stroke-width="1.5"/>
  <line x1="88" y1="56" x2="88" y2="52" stroke="#007ACC" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="88" y1="56" x2="91" y2="58" stroke="#007ACC" stroke-width="1.5" stroke-linecap="round"/>
</svg>
